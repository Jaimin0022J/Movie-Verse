<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Clapperboard Top -->
    <path d="M150 160 L362 100 L378 156 L166 216 Z" fill="url(#redGradient)" />
    <path d="M170 155 L200 146 M230 137 L260 128 M290 119 L320 110 M350 101 L380 92" stroke="#1a1a27" stroke-width="12" stroke-linecap="round" />
    
    <!-- Film Reel Circle -->
    <circle cx="256" cy="280" r="110" stroke="url(#redGradient)" stroke-width="12" />
    <circle cx="256" cy="280" r="95" stroke="url(#redGradient)" stroke-width="2" opacity="0.5" />
    
    <!-- Reel Holes -->
    <circle cx="256" cy="210" r="22" fill="url(#redGradient)" opacity="0.8" />
    <circle cx="316" cy="254" r="22" fill="url(#redGradient)" opacity="0.8" />
    <circle cx="293" cy="326" r="22" fill="url(#redGradient)" opacity="0.8" />
    <circle cx="219" cy="326" r="22" fill="url(#redGradient)" opacity="0.8" />
    <circle cx="196" cy="254" r="22" fill="url(#redGradient)" opacity="0.8" />
    
    <!-- Play Triangle -->
    <path d="M236 245 L296 280 L236 315 Z" fill="url(#redGradient)" />
  </g>
</svg>
